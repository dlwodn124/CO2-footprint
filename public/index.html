<style>
    /* 추가된 스타일 */
    .log-list { margin-top: 20px; text-align: left; max-height: 300px; overflow-y: auto; }
    .log-item { background: #f9fafb; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    .log-info { font-size: 0.9rem; }
    .del-btn { width: auto; padding: 5px 10px; background: #ef4444; margin-top: 0; font-size: 0.8rem; }
</style>

<div id="page3" class="page">
    <h1>🌍 실천 가이드</h1>
    <div class="result-badge">오늘의 배출량: <span id="carbon-res">0</span>kg</div>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <h3>📊 나의 기록 히스토리</h3>
    <button onclick="loadLogs()" style="background: #3b82f6; margin-bottom: 15px;">내 기록 불러오기</button>
    <div id="log-container" class="log-list">
        </div>

    <button onclick="nextPage(1)" style="background: #6b7280; margin-top: 1rem;">처음으로 돌아가기</button>
</div>

<script>
    // ... 기존 nextPage, calculateAndGo 함수 유지 ...

    // 기록 불러오기 함수
    async function loadLogs() {
        try {
            const response = await fetch('/api/logs');
            const logs = await response.json();
            const container = document.getElementById('log-container');
            container.innerHTML = ''; // 초기화

            logs.forEach(log => {
                const date = new Date(log.created_at).toLocaleDateString();
                container.innerHTML += `
                    <div class="log-item">
                        <div class="log-info">
                            <strong>${log.activity}</strong> (${log.distance}km)<br>
                            <small>${date} - ${log.carbon_kg}kg</small>
                        </div>
                        <button class="del-btn" onclick="deleteLog(${log.id})">삭제</button>
                    </div>
                `;
            });
        } catch (e) {
            alert("기록을 불러오는데 실패했습니다.");
        }
    }

    // 기록 삭제 함수
    async function deleteLog(id) {
        if(!confirm("정말 이 기록을 삭제하시겠습니까?")) return;

        try {
            const response = await fetch(`/api/logs/${id}`, { method: 'DELETE' });
            if(response.ok) {
                alert("삭제되었습니다.");
                loadLogs(); // 목록 새로고침
            }
        } catch (e) {
            alert("삭제에 실패했습니다.");
        }
    }
</script>
