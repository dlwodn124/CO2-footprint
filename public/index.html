<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지구 지킴이 탄소 계산기</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 90%; max-width: 400px; }
        h1 { color: #166534; font-size: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        select, input { width: 100%; padding: 0.8rem; border: 1px solid #dcfce7; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; background: #22c55e; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        #result { margin-top: 1.5rem; padding: 1rem; background: #f8fafc; border-radius: 10px; display: none; text-align: center; }
        .carbon-num { font-size: 2rem; color: #15803d; font-weight: 800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 탄소 발자국 계산기</h1>
        <div class="form-group">
            <label>교통수단</label>
            <select id="activity">
                <option value="0.21">승용차 (휘발유)</option>
                <option value="0.06">버스</option>
                <option value="0.01">지하철</option>
            </select>
        </div>
        <div class="form-group">
            <label>이동 거리 (km)</label>
            <input type="number" id="distance" placeholder="예: 15">
        </div>
        <button onclick="calculate()">계산 및 기록하기</button>

        <div id="result">
            <p>오늘 배출한 탄소량</p>
            <div class="carbon-num"><span id="val">0</span> kg</div>
            <p id="msg" style="font-size: 0.9rem; color: #666;"></p>
        </div>
    </div>

    <script>
        async function calculate() {
            const factor = document.getElementById('activity').value;
            const dist = document.getElementById('distance').value;
            if(!dist) return alert("거리를 입력해주세요!");

            const carbon = (factor * dist).toFixed(2);
            document.getElementById('val').innerText = carbon;
            document.getElementById('result').style.display = 'block';
            document.getElementById('msg').innerText = `소나무 ${(carbon / 0.02).toFixed(1)}그루가 하루 종일 흡수해야 하는 양입니다.`;

            // Render 서버를 통해 Neon DB로 전송
            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        activity: document.getElementById('activity').selectedOptions[0].text,
                        distance: dist,
                        carbon: carbon
                    })
                });
                if(response.ok) console.log("DB 저장 성공");
            } catch (e) {
                console.error("저장 실패", e);
            }
        }
    </script>
</body>
</html>
