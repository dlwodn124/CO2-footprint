<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탄소 중립 프로젝트</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f0fdf4; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background: white; padding: 2.5rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); width: 100%; max-width: 450px; text-align: center; }
        
        /* 페이지 전환용 스타일 */
        .page { display: none; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #166534; font-size: 1.8rem; margin-bottom: 1.5rem; }
        p { color: #4b5563; line-height: 1.6; margin-bottom: 2rem; }
        
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #374151; }
        select, input { width: 100%; padding: 0.9rem; border: 2px solid #e5e7eb; border-radius: 12px; box-sizing: border-box; transition: border-color 0.3s; }
        select:focus, input:focus { border-color: #22c55e; outline: none; }
        
        button { width: 100%; padding: 1.1rem; background: #22c55e; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #16a34a; }

        /* 가이드 아이템 */
        .guide-box { background: #f9fafb; padding: 1.2rem; border-radius: 15px; margin-bottom: 1rem; text-align: left; border-left: 5px solid #22c55e; }
        .guide-box h3 { margin: 0 0 5px 0; color: #15803d; font-size: 1.1rem; }
        .guide-box p { margin: 0; font-size: 0.95rem; margin-bottom: 0; }
        
        .result-badge { background: #dcfce7; color: #15803d; padding: 1rem; border-radius: 15px; margin-bottom: 2rem; }
        .result-badge span { font-size: 2.2rem; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <div id="page1" class="page active">
            <h1>🌱 지구를 위한 첫걸음</h1>
            <p>우리가 일상에서 배출하는 탄소가 지구에 어떤 영향을 주는지 알고 계신가요? 지금 바로 확인하고 실천해 보세요.</p>
            <button onclick="nextPage(2)">나의 탄소 배출량 계산하기</button>
        </div>

        <div id="page2" class="page">
            <h1>📊 탄소 배출 계산</h1>
            <div class="form-group">
                <label>이용하신 교통수단</label>
                <select id="activity">
                    <option value="0.21">승용차 (휘발유)</option>
                    <option value="0.06">버스</option>
                    <option value="0.01">지하철</option>
                </select>
            </div>
            <div class="form-group">
                <label>이동 거리 (km)</label>
                <input type="number" id="distance" placeholder="예: 10">
            </div>
            <button onclick="calculateAndGo()">계산 결과 확인하기</button>
        </div>

        <div id="page3" class="page">
            <h1>🌍 실천 가이드</h1>
            <div class="result-badge">
                오늘의 배출량: <span id="carbon-res">0</span>kg
            </div>
            
            <div class="guide-box">
                <h3>🚶 가까운 거리는 걷기</h3>
                <p>2km 이내는 도보나 자전거를 이용해 보세요.</p>
            </div>
            <div class="guide-box">
                <h3>🥗 채식 위주의 식사</h3>
                <p>육류 소비를 줄이는 것만으로도 탄소를 아낄 수 있습니다.</p>
            </div>
            <div class="guide-box">
                <h3>💡 에너지 절약하기</h3>
                <p>안 쓰는 가전제품 플러그를 뽑아 대기전력을 줄이세요.</p>
            </div>
            <button onclick="nextPage(1)" style="background: #6b7280; margin-top: 1rem;">처음으로 돌아가기</button>
        </div>
    </div>

    <script>
        // 페이지 전환 함수
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // 계산하고 3페이지로 넘어가기
        async function calculateAndGo() {
            const factor = document.getElementById('activity').value;
            const dist = document.getElementById('distance').value;
            
            if(!dist) {
                alert("이동 거리를 입력해 주세요!");
                return;
            }

            const carbon = (factor * dist).toFixed(2);
            document.getElementById('carbon-res').innerText = carbon;

            // 데이터 DB 저장 (Neon 연동)
            try {
                await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        activity: document.getElementById('activity').selectedOptions[0].text,
                        distance: dist,
                        carbon: carbon
                    })
                });
            } catch (e) {
                console.error("저장 실패", e);
            }

            // 3페이지로 이동
            nextPage(3);
        }
    </script>
</body>
</html>
